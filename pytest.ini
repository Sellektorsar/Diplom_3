[tool:pytest]
minversion = 6.0
addopts =
    -ra
    --alluredir=allure-results
    --clean-alluredir
    -v
    --tb=short
    --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    ui: UI тесты
    api: API тесты
    smoke: Критически важные тесты
    regression: Регрессионные тесты
    browser: Тесты для конкретного браузера

[allure]
title = Stellar Burgers - Тесты веб-интерфейса
descriptionHtml = |
    <h1>Автоматизированное тестирование веб-приложения Stellar Burgers</h1>
    <p>Набор тестов для проверки функциональности веб-приложения Stellar Burgers</p>
    <ul>
        <li>Восстановление пароля</li>
        <li>Личный кабинет</li>
        <li>Основной функционал</li>
        <li>Лента заказов</li>
    </ul>

[selenium]
browser = chrome
remote_url =

[firefox]
geckodriver_path = geckodriver.exe

[chrome]
chromedriver_path = chromedriver.exe